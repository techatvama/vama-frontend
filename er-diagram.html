<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vama Optimus — ER Diagram</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070b14;font-family:'SF Mono','Fira Code',monospace;overflow:auto;min-height:100vh}
#wrap{position:relative;width:1860px;height:1360px;margin:70px auto 60px}
#svg-lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
#tbl-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2}
.t{position:absolute;border-radius:10px;overflow:hidden;border:1.5px solid}
.th{padding:7px 12px 6px;font-size:12px;font-weight:800;letter-spacing:0.04em;color:#fff;font-family:system-ui,sans-serif;border-bottom:2px solid}
.tr{display:flex;align-items:center;gap:5px;padding:0 10px;height:22px;font-size:9.5px;border-top:1px solid rgba(255,255,255,0.04)}
.cn{color:#94a3b8;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ct{color:#334155;font-size:8.5px;white-space:nowrap}
.pk{background:#fbbf24;color:#000;border-radius:3px;padding:0 4px;font-size:7.5px;font-weight:900;flex-shrink:0}
.fk{background:#3b82f6;color:#fff;border-radius:3px;padding:0 4px;font-size:7.5px;font-weight:900;flex-shrink:0}
.topbar{position:fixed;top:0;left:0;right:0;background:rgba(7,11,20,0.95);backdrop-filter:blur(12px);padding:14px 28px;z-index:100;border-bottom:1px solid #1e2d4a;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:18px;font-weight:900;color:#fff;letter-spacing:-0.03em;font-family:system-ui}
.topbar p{font-size:11px;color:#475569;margin-top:2px;font-family:system-ui}
.legend{display:flex;gap:20px;align-items:center}
.li{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:#64748b;font-family:system-ui}
.ld{width:10px;height:10px;border-radius:50%}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <h1>Vama Optimus — Entity Relationship Diagram</h1>
    <p>20 tables · 34 foreign key relationships · PostgreSQL + SQLAlchemy ORM</p>
  </div>
  <div class="legend">
    <div class="li"><span class="pk">PK</span> Primary Key</div>
    <div class="li"><span class="fk">FK</span> Foreign Key</div>
    <div class="li"><div class="ld" style="background:#7c3aed"></div>Identity / Staff</div>
    <div class="li"><div class="ld" style="background:#ea580c"></div>Scheduling</div>
    <div class="li"><div class="ld" style="background:#1d4ed8"></div>Student</div>
    <div class="li"><div class="ld" style="background:#0d9488"></div>Curriculum</div>
    <div class="li"><div class="ld" style="background:#b45309"></div>Finance / Exams</div>
  </div>
</div>

<div id="wrap">
  <svg id="svg-lines"></svg>
  <div id="tbl-layer"></div>
</div>

<script>
const H=36, R=22, PB=8, TW=255;

const T={
  staff:{x:40,y:40,c:'#7c3aed',bg:'#170d2e',cols:[
    ['id','INT',1,0],['name','VARCHAR',0,0],['first_name','VARCHAR',0,0],['last_name','VARCHAR',0,0],
    ['role','VARCHAR',0,0],['phone','VARCHAR',0,0],['email','VARCHAR',0,0],['password_hash','VARCHAR',0,0],
    ['calendar','BOOLEAN',0,0],['takes_classes','BOOLEAN',0,0],['created_at','TIMESTAMP',0,0],['updated_at','TIMESTAMP',0,0]
  ]},
  subjects:{x:40,y:380,c:'#0d9488',bg:'#021f1a',cols:[
    ['id','INT',1,0],['name','VARCHAR',0,0],['description','TEXT',0,0],['is_active','BOOLEAN',0,0],
    ['created_at','TIMESTAMP',0,0],['updated_at','TIMESTAMP',0,0]
  ]},
  grades:{x:40,y:592,c:'#0d9488',bg:'#021f1a',cols:[
    ['id','INT',1,0],['name','VARCHAR',0,0],['level','INT',0,0],['description','TEXT',0,0],['created_at','TIMESTAMP',0,0]
  ]},
  batches:{x:340,y:40,c:'#ea580c',bg:'#200d02',cols:[
    ['id','INT',1,0],['subject','VARCHAR',0,0],['name','VARCHAR',0,0],['capacity','INT',0,0],
    ['color_tag','VARCHAR',0,0],['is_recurring','BOOLEAN',0,0],['days_of_week','VARCHAR',0,0],
    ['start_date','DATE',0,0],['end_date','DATE',0,0],['start_time','VARCHAR',0,0],['end_time','VARCHAR',0,0],
    ['teacher_id','INT',0,1],['co_teacher_id','INT',0,1],['created_at','TIMESTAMP',0,0]
  ]},
  class_sessions:{x:340,y:414,c:'#ea580c',bg:'#200d02',cols:[
    ['id','INT',1,0],['batch_id','INT',0,1],['recurrence_id','VARCHAR',0,0],['date','DATE',0,0],
    ['start_time','VARCHAR',0,0],['end_time','VARCHAR',0,0],['teacher_id','INT',0,1],
    ['status','VARCHAR',0,0],['is_published','BOOLEAN',0,0],['notes','TEXT',0,0],['created_at','TIMESTAMP',0,0]
  ]},
  enrollments:{x:340,y:724,c:'#ea580c',bg:'#200d02',cols:[
    ['id','INT',1,0],['student_id','INT',0,1],['batch_id','INT',0,1],
    ['enrollment_type','VARCHAR',0,0],['created_at','TIMESTAMP',0,0]
  ]},
  attendance:{x:340,y:914,c:'#ea580c',bg:'#200d02',cols:[
    ['id','INT',1,0],['session_id','INT',0,1],['student_id','INT',0,1],
    ['status','VARCHAR',0,0],['notes','VARCHAR',0,0],['marked_by','INT',0,1],
    ['marked_at','TIMESTAMP',0,0],['created_at','TIMESTAMP',0,0]
  ]},
  students:{x:640,y:40,c:'#1d4ed8',bg:'#0d0f2a',cols:[
    ['id','INT',1,0],['first_name','VARCHAR',0,0],['last_name','VARCHAR',0,0],['email','VARCHAR',0,0],
    ['primary_phone_number','VARCHAR',0,0],['date_of_birth','VARCHAR',0,0],['gender','VARCHAR',0,0],
    ['address','VARCHAR',0,0],['city','VARCHAR',0,0],['state','VARCHAR',0,0],
    ['desired_course','VARCHAR',0,0],['class_frequency','VARCHAR',0,0],['current_grade','VARCHAR',0,0],
    ['syllabus_type','VARCHAR',0,0],['is_exam_student','BOOLEAN',0,0],['exam_date','DATE',0,0],
    ['password_hash','VARCHAR',0,0],['created_at','TIMESTAMP',0,0],['updated_at','TIMESTAMP',0,0]
  ]},
  feedback:{x:640,y:530,c:'#1d4ed8',bg:'#0d0f2a',cols:[
    ['id','INT',1,0],['session_id','INT',0,1],['student_id','INT',0,1],['teacher_id','INT',0,1],
    ['feedback','TEXT',0,0],['syllabus_covered','TEXT',0,0],['performance_rating','INT',0,0],
    ['created_at','TIMESTAMP',0,0],['updated_at','TIMESTAMP',0,0]
  ]},
  class_cancellations:{x:640,y:800,c:'#1d4ed8',bg:'#0d0f2a',cols:[
    ['id','INT',1,0],['session_id','INT',0,1],['student_id','INT',0,1],
    ['cancellation_type','VARCHAR',0,0],['reason','TEXT',0,0],['requested_at','TIMESTAMP',0,0],
    ['status','VARCHAR',0,0],['new_session_id','INT',0,1],['approved_by','INT',0,1],['approved_at','TIMESTAMP',0,0]
  ]},
  teacher_subject_assignments:{x:950,y:40,c:'#7c3aed',bg:'#170d2e',cols:[
    ['id','INT',1,0],['teacher_id','INT',0,1],['subject_id','INT',0,1],
    ['can_edit_curriculum','BOOLEAN',0,0],['assigned_at','TIMESTAMP',0,0]
  ]},
  materials:{x:950,y:220,c:'#b45309',bg:'#1c0e02',cols:[
    ['id','INT',1,0],['teacher_id','INT',0,1],['student_id','INT',0,1],
    ['title','VARCHAR',0,0],['file_url','VARCHAR',0,0],['file_type','VARCHAR',0,0],['created_at','TIMESTAMP',0,0]
  ]},
  student_progress:{x:950,y:444,c:'#1d4ed8',bg:'#0d0f2a',cols:[
    ['id','INT',1,0],['student_id','INT',0,1],['content_id','INT',0,1],
    ['status','VARCHAR',0,0],['notes','TEXT',0,0],['completed_at','TIMESTAMP',0,0],['updated_at','TIMESTAMP',0,0]
  ]},
  payments:{x:950,y:668,c:'#b45309',bg:'#1c0e02',cols:[
    ['id','INT',1,0],['student_id','INT',0,1],['amount','FLOAT',0,0],['payment_type','VARCHAR',0,0],
    ['description','TEXT',0,0],['status','VARCHAR',0,0],['issue_date','TIMESTAMP',0,0],
    ['due_date','DATE',0,0],['paid_date','TIMESTAMP',0,0],['payment_method','VARCHAR',0,0],
    ['transaction_id','VARCHAR',0,0],['created_by','INT',0,1],['created_at','TIMESTAMP',0,0],['updated_at','TIMESTAMP',0,0]
  ]},
  exam_enrollments:{x:950,y:1042,c:'#1d4ed8',bg:'#0d0f2a',cols:[
    ['id','INT',1,0],['student_id','INT',0,1],['exam_session_id','INT',0,1],['enrolled_by','INT',0,1],
    ['enrollment_status','VARCHAR',0,0],['payment_status','VARCHAR',0,0],['enrolled_at','TIMESTAMP',0,0]
  ]},
  syllabus:{x:1250,y:40,c:'#0d9488',bg:'#021f1a',cols:[
    ['id','INT',1,0],['name','VARCHAR',0,0],['description','VARCHAR',0,0],
    ['subject_id','INT',0,1],['grade_id','INT',0,1],['created_at','TIMESTAMP',0,0]
  ]},
  modules:{x:1250,y:250,c:'#0d9488',bg:'#021f1a',cols:[
    ['id','INT',1,0],['syllabus_id','INT',0,1],['name','VARCHAR',0,0],
    ['weight','INT',0,0],['order','INT',0,0],['created_at','TIMESTAMP',0,0]
  ]},
  contents:{x:1250,y:460,c:'#0d9488',bg:'#021f1a',cols:[
    ['id','INT',1,0],['module_id','INT',0,1],['name','VARCHAR',0,0],
    ['content_type','VARCHAR',0,0],['weight','INT',0,0],['order','INT',0,0],['created_at','TIMESTAMP',0,0]
  ]},
  exam_sessions:{x:1250,y:682,c:'#b45309',bg:'#1c0e02',cols:[
    ['id','INT',1,0],['name','VARCHAR',0,0],['exam_board','VARCHAR',0,0],
    ['grade_id','INT',0,1],['subject_id','INT',0,1],['exam_date','DATE',0,0],
    ['registration_deadline','DATE',0,0],['fee_amount','FLOAT',0,0],['max_students','INT',0,0],
    ['is_active','BOOLEAN',0,0],['notes','TEXT',0,0],['created_by','INT',0,1],
    ['created_at','TIMESTAMP',0,0],['updated_at','TIMESTAMP',0,0]
  ]},
  cancellation_rules:{x:1560,y:40,c:'#475569',bg:'#0d111a',cols:[
    ['id','INT',1,0],['package_name','VARCHAR',0,0],['advance_notice_hours','INT',0,0],
    ['max_cancellations_per_month','INT',0,0],['penalty_percentage','FLOAT',0,0],
    ['allows_rescheduling','BOOLEAN',0,0],['description','TEXT',0,0],['created_at','TIMESTAMP',0,0]
  ]}
};

// [from_table, from_col, to_table, to_col, color, dash?]
const RELS=[
  ['batches','teacher_id','staff','id','#a78bfa'],
  ['batches','co_teacher_id','staff','id','#7c3aed'],
  ['class_sessions','batch_id','batches','id','#fb923c'],
  ['class_sessions','teacher_id','staff','id','#94a3b8'],
  ['enrollments','student_id','students','id','#60a5fa'],
  ['enrollments','batch_id','batches','id','#fb923c'],
  ['attendance','session_id','class_sessions','id','#fb923c'],
  ['attendance','student_id','students','id','#60a5fa'],
  ['attendance','marked_by','staff','id','#94a3b8'],
  ['feedback','session_id','class_sessions','id','#fb923c'],
  ['feedback','student_id','students','id','#60a5fa'],
  ['feedback','teacher_id','staff','id','#94a3b8'],
  ['syllabus','subject_id','subjects','id','#34d399'],
  ['syllabus','grade_id','grades','id','#34d399'],
  ['modules','syllabus_id','syllabus','id','#2dd4bf'],
  ['contents','module_id','modules','id','#2dd4bf'],
  ['student_progress','student_id','students','id','#60a5fa'],
  ['student_progress','content_id','contents','id','#2dd4bf'],
  ['materials','teacher_id','staff','id','#94a3b8'],
  ['materials','student_id','students','id','#60a5fa'],
  ['teacher_subject_assignments','teacher_id','staff','id','#a78bfa'],
  ['teacher_subject_assignments','subject_id','subjects','id','#34d399'],
  ['exam_sessions','grade_id','grades','id','#34d399'],
  ['exam_sessions','subject_id','subjects','id','#34d399'],
  ['exam_sessions','created_by','staff','id','#94a3b8'],
  ['exam_enrollments','student_id','students','id','#60a5fa'],
  ['exam_enrollments','exam_session_id','exam_sessions','id','#fbbf24'],
  ['exam_enrollments','enrolled_by','staff','id','#94a3b8'],
  ['class_cancellations','session_id','class_sessions','id','#fb923c'],
  ['class_cancellations','student_id','students','id','#60a5fa'],
  ['class_cancellations','new_session_id','class_sessions','id','#f87171'],
  ['class_cancellations','approved_by','staff','id','#94a3b8'],
  ['payments','student_id','students','id','#60a5fa'],
  ['payments','created_by','staff','id','#94a3b8'],
];

function th(t){return H+t.cols.length*R+PB}
function rowY(t,col){const i=t.cols.findIndex(c=>c[0]===col);return t.y+H+i*R+R/2}

// Render tables
const layer=document.getElementById('tbl-layer');
Object.entries(T).forEach(([name,t])=>{
  const div=document.createElement('div');
  div.className='t';
  div.style.cssText=`left:${t.x}px;top:${t.y}px;width:${TW}px;height:${th(t)}px;border-color:${t.c}44;`;
  let h=`<div class="th" style="background:${t.c}18;border-bottom-color:${t.c};color:${t.c};">
    <span style="color:#94a3b8;font-size:9px;margin-right:4px;">▣</span>${name}
  </div>`;
  t.cols.forEach(([cn,ct,pk,fk])=>{
    h+=`<div class="tr" style="background:${t.bg};">
      <span class="cn">${cn}</span>
      <span class="ct">${ct}</span>
      ${pk?'<span class="pk">PK</span>':''}
      ${fk?'<span class="fk">FK</span>':''}
    </div>`;
  });
  div.innerHTML=h;
  layer.appendChild(div);
});

// Build SVG
const colors=['#a78bfa','#7c3aed','#fb923c','#94a3b8','#60a5fa','#34d399','#2dd4bf','#fbbf24','#f87171'];
let svgHtml=`<defs>${colors.map(c=>{
  const id='m'+c.replace('#','');
  return `<marker id="${id}" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
    <polygon points="0 0, 7 3.5, 0 7" fill="${c}" opacity="0.75"/>
  </marker>`;
}).join('')}</defs>`;

RELS.forEach(([fn,fc,tn,tc,col])=>{
  const ft=T[fn],tt=T[tn];
  if(!ft||!tt)return;
  const fy=rowY(ft,fc);
  const ty=rowY(tt,tc);
  const mid=document.getElementById; // unused, just placeholder

  let x1,x2,d;
  const fRight=ft.x+TW, fLeft=ft.x, tRight=tt.x+TW, tLeft=tt.x;

  if(fLeft>=tRight+10){
    // from is strictly right of to → left edge of from to right edge of to
    x1=fLeft; x2=tRight;
    const gap=x1-x2;
    const cx1=x1-gap*0.4, cx2=x2+gap*0.4;
    d=`M${x1} ${fy} C${cx1} ${fy},${cx2} ${ty},${x2} ${ty}`;
  } else if(tLeft>=fRight+10){
    // to is strictly right of from → right edge of from to left edge of to
    x1=fRight; x2=tLeft;
    const gap=x2-x1;
    const cx1=x1+gap*0.4, cx2=x2-gap*0.4;
    d=`M${x1} ${fy} C${cx1} ${fy},${cx2} ${ty},${x2} ${ty}`;
  } else {
    // same column or overlapping → route via right side with offset
    x1=fRight+10; x2=tRight+10;
    const ox=Math.max(fRight,tRight)+40;
    d=`M${fRight} ${fy} L${ox} ${fy} L${ox} ${ty} L${tRight} ${ty}`;
  }

  const mid2=`url(#m${col.replace('#','')})`;
  svgHtml+=`<path d="${d}" stroke="${col}" stroke-width="1.3" fill="none" opacity="0.45" marker-end="${mid2}"/>`;
});

document.getElementById('svg-lines').innerHTML=svgHtml;
</script>
</body>
</html>
